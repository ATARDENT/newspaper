name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy"
        required: true
        default: "main"
        type: string
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Select ref to deploy
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.deploy_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Astro for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"

          # Create static config override for Pages deployment
          cat > astro.config.mjs << 'EOF'
          // @ts-check
          import { defineConfig } from 'astro/config';

          const [owner = '', repo = ''] = (process.env.GITHUB_REPOSITORY ?? '').split('/');
          const isUserOrOrgPagesRepo =
          	owner.length > 0 && repo.toLowerCase() === `${owner.toLowerCase()}.github.io`;
          const inferredSite = owner ? `https://${owner}.github.io` : undefined;
          const inferredBase = repo
          	? isUserOrOrgPagesRepo
          		? '/'
          		: `/${repo}`
          	: '/';

          // https://astro.build/config
          export default defineConfig({
          	output: 'static',
          	site: process.env.ASTRO_SITE ?? inferredSite,
          	base: process.env.ASTRO_BASE ?? inferredBase,
          	integrations: [],
          });
          EOF

          echo "Created static Astro config for Pages deployment"
          echo "---- astro.config.mjs ----"
          cat astro.config.mjs

      - name: Patch server-rendered pages for static build
        run: |
          echo "Checking for server-rendered pages (prerender = false)..."

          # Find and patch files with prerender = false
          find src -type f \( -name "*.ts" -o -name "*.js" -o -name "*.astro" \) -exec grep -l "prerender.*=.*false" {} \; 2>/dev/null | while read -r file; do
            echo "Patching: $file"
            sed -i 's/export\s*const\s*prerender\s*=\s*false/export const prerender = true/g' "$file"
            # Also handle variations
            sed -i 's/prerender:\s*false/prerender: true/g' "$file"
          done

          echo "Patched all server-rendered pages to static"

          # Verify no prerender = false remains
          if grep -r "prerender.*=.*false" src/ 2>/dev/null; then
            echo "WARNING: Some files still have prerender = false"
          else
            echo "✓ All pages ready for static build"
          fi

      - name: Derive Astro site/base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"
          OWNER_LC="${OWNER_NAME,,}"
          REPO_LC="${REPO_NAME,,}"

          if [ "$REPO_LC" = "${OWNER_LC}.github.io" ]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${REPO_NAME}"
          fi

          echo "ASTRO_SITE=https://${OWNER_NAME}.github.io" >> "$GITHUB_ENV"
          echo "ASTRO_BASE=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "Using ASTRO_SITE=https://${OWNER_NAME}.github.io"
          echo "Using ASTRO_BASE=${BASE_PATH}"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify Pages artifact
        run: |
          if [ -f dist/index.html ]; then
            echo "✓ dist/index.html exists"
            ls -la dist/
            exit 0
          fi

          echo "ERROR: dist/index.html not found."
          echo "Listing dist/ for debugging:"
          ls -la dist || true
          exit 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
