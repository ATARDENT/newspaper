name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy"
        required: true
        default: "main"
        type: string
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Select ref to deploy
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.deploy_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Derive Astro site/base for Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"
          OWNER_LC="${OWNER_NAME,,}"
          REPO_LC="${REPO_NAME,,}"

          if [ "$REPO_LC" = "${OWNER_LC}.github.io" ]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${REPO_NAME}"
          fi

          echo "ASTRO_SITE=https://${OWNER_NAME}.github.io" >> "$GITHUB_ENV"
          echo "ASTRO_BASE=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "Using ASTRO_SITE=https://${OWNER_NAME}.github.io"
          echo "Using ASTRO_BASE=${BASE_PATH}"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify Pages artifact
        run: |
          test -f dist/index.html
          echo "dist/index.html exists"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
